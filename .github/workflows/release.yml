name: Build and Publish Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.0.0). If empty, the current branch/tag name will be used.'
        required: false
        default: ''

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build All BepInEx Mods
        run: |
          for csproj in BepInExMods/*/*.csproj; do
            echo "Building $csproj..."
            dotnet build "$csproj" -c Release
          done

      - name: Structure Release Assets
        run: |
          # Create separate staging folders
          mkdir -p dist/bepinex/BepInEx/plugins
          mkdir -p "dist/native/Frontier Pilot Simulator_Data/StreamingAssets/Descriptions/Native"

          # Discover and copy all compiled BepInEx plugins and their JSON configs
          for csproj in BepInExMods/*/*.csproj; do
            proj_dir=$(dirname "$csproj")
            proj_name=$(basename "$csproj" .csproj)
            
            dll_path="$proj_dir/bin/Release/net472/$proj_name.dll"
            if [ -f "$dll_path" ]; then
              echo "Copying $dll_path to staging..."
              cp "$dll_path" dist/bepinex/BepInEx/plugins/
            fi
            
            # Copy any JSON files located in the project's root folder (e.g. recipes.json)
            find "$proj_dir" -maxdepth 1 -name "*.json" -exec cp {} dist/bepinex/BepInEx/plugins/ \;
          done

          # Copy Native StreamingAssets structure
          cp -r Ships "dist/native/Frontier Pilot Simulator_Data/StreamingAssets/Descriptions/Native/"
          cp -r Localization "dist/native/Frontier Pilot Simulator_Data/StreamingAssets/Descriptions/Native/"
          cp -r World "dist/native/Frontier Pilot Simulator_Data/StreamingAssets/Descriptions/Native/"

      - name: Package Assets
        run: |
          cd dist/bepinex
          zip -r ../../BepInEx-Plugins.zip *
          cd ../native
          zip -r ../../Native-Overrides.zip *

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BepInEx-Plugins.zip
            Native-Overrides.zip
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
